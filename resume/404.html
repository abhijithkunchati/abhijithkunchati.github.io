<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
    fetch('https://api.github.com/repos/abhijithkunchati/abhijithkunchati.github.io/contents/resume')
        .then(response => response.json())
        .then(data => {
            const latestResume = data.find(file => file.type === 'file' && file.name.endsWith('.pdf')).name;
            window.location.href = window.origin+"/resume/"+latestResume;
        })
        .catch(error => console.error('Error fetching resume filename:', error));
    </script>
</head>
<body>
    <p>404 Not Found. You can contact me at abhijithkunchati@gmail.com</p>
</body>
</html>
