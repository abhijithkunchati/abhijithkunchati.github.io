<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
    fetch('https://api.github.com/repos/abhijithkunchati/abhijithkunchati.github.io/contents/')
        .then(response => response.json())
        .then(data => {
            const latestResume = data.find(file => file.type === 'file' && file.name.endsWith('.pdf')).name;
            window.location.href = latestResume;
        })
        .catch(error => console.error('Error fetching resume filename:', error));
        // window.location.href = "resume_file_name.pdf"; // Replace 'resume_file_name.pdf' with the actual filename of your resume
    </script>
</head>
<body>
    <!-- Optional: You can add a message for users before redirecting -->
    <p>404 Not Found. You can view my resume <a href="/resume">here.</a>.</p>
</body>
</html>
